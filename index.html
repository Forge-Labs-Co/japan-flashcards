<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0b0c0e" media="(prefers-color-scheme: dark)">
<title>Japan Phrases</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#fbfbfc; --panel:#ffffff; --card:#ffffff;
    --ink:#0d0e10; --muted:#8a8f98; --faint:#b4b8bf;
    --line:#e8e8ea; --line-soft:#f0f0f2;
    --accent:#5e6ad2; --accent-soft:rgba(94,106,210,.10);
    --romaji:#5a5f68; --jp:#a4a8b0;
    --shadow:0 1px 2px rgba(13,14,16,.04),0 1px 3px rgba(13,14,16,.03);
    --header-bg:rgba(251,251,252,.82);
  }
  html[data-theme="dark"]{
    --bg:#0b0c0e; --panel:#141518; --card:#141518;
    --ink:#f7f8f8; --muted:#8a8f98; --faint:#5c6069;
    --line:#23252a; --line-soft:#1b1d21;
    --accent:#7e88e0; --accent-soft:rgba(126,136,224,.14);
    --romaji:#c4c8d0; --jp:#6b7078;
    --shadow:none;
    --header-bg:rgba(11,12,14,.80);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--ink);
    -webkit-font-smoothing:antialiased; letter-spacing:-.01em;
    padding-bottom:env(safe-area-inset-bottom);
  }
  header{
    position:sticky; top:0; z-index:20;
    background:var(--header-bg); backdrop-filter:saturate(180%) blur(12px);
    -webkit-backdrop-filter:saturate(180%) blur(12px);
    border-bottom:1px solid var(--line);
    padding:calc(env(safe-area-inset-top) + 12px) 16px 12px;
  }
  .bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .brand{display:flex;align-items:center;gap:9px;font-weight:600;font-size:16px;letter-spacing:-.02em;}
  .glyph{
    width:26px;height:26px;border-radius:7px;
    background:linear-gradient(135deg,var(--accent),#8b93e6);
    display:inline-flex;align-items:center;justify-content:center;
    color:#fff;font-size:13px;font-weight:600;
  }
  .theme-btn{
    width:34px;height:34px;border-radius:9px;border:1px solid var(--line);
    background:var(--panel);color:var(--muted);cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .theme-btn:active{transform:scale(.94);}
  .theme-btn svg{width:17px;height:17px;}
  .sun{display:none;} html[data-theme="dark"] .sun{display:block;}
  html[data-theme="dark"] .moon{display:none;}
  .search-wrap{position:relative;}
  .search-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--faint);pointer-events:none;}
  .search-ico svg{width:16px;height:16px;display:block;}
  #search{
    width:100%; border:1px solid var(--line); border-radius:10px;
    padding:11px 38px 11px 36px; font-size:16px; font-family:inherit;
    background:var(--panel); color:var(--ink); outline:none; letter-spacing:-.01em;
    transition:border-color .12s,box-shadow .12s;
  }
  #search::placeholder{color:var(--faint);}
  #search:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
  .clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);
    border:none;background:var(--line);color:var(--muted);width:22px;height:22px;border-radius:6px;
    font-size:14px;display:none;align-items:center;justify-content:center;cursor:pointer;line-height:1;}
  .clear.show{display:flex;}
  .tabs{
    display:flex; gap:6px; overflow-x:auto; padding:10px 16px 4px;
    position:sticky; top:0; z-index:10; background:var(--bg);
    -webkit-overflow-scrolling:touch; scrollbar-width:none;
  }
  .tabs::-webkit-scrollbar{display:none;}
  .chip{
    flex:0 0 auto; border:1px solid var(--line); background:var(--panel); color:var(--muted);
    padding:6px 13px; border-radius:8px; font-size:13px; font-weight:500; font-family:inherit;
    cursor:pointer; white-space:nowrap; letter-spacing:-.01em;
    transition:all .12s;
  }
  .chip.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  main{padding:6px 12px 40px;}
  .cat-head{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;
    color:var(--faint);margin:20px 8px 8px;}
  .card{
    background:var(--card); border:1px solid var(--line); border-radius:12px;
    padding:14px 14px 13px; margin-bottom:8px; display:flex; gap:12px; align-items:flex-start;
    box-shadow:var(--shadow); transition:border-color .12s;
  }
  .card:active{border-color:var(--faint);}
  .card .body{flex:1;min-width:0;}
  .en{font-size:16px;font-weight:600;line-height:1.3;margin-bottom:5px;letter-spacing:-.015em;}
  .phon{font-size:13.5px;color:var(--accent);font-weight:600;margin-bottom:2px;}
  .romaji{font-size:13.5px;color:var(--romaji);font-style:italic;margin-bottom:6px;}
  .jp{font-size:12.5px;color:var(--jp);font-weight:500;}
  .speak{
    flex:0 0 auto; width:40px;height:40px;border-radius:10px;
    border:1px solid var(--line); background:var(--panel); color:var(--accent);
    display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .12s;
  }
  .speak:active{transform:scale(.90);}
  .speak svg{width:19px;height:19px;}
  .speak.playing{background:var(--accent);border-color:var(--accent);color:#fff;}
  .empty{text-align:center;color:var(--muted);padding:56px 20px;font-size:14px;line-height:1.6;}
  .count{text-align:center;color:var(--faint);font-size:12px;padding:10px 0 24px;}
  .foot{text-align:center;color:var(--faint);font-size:12px;padding:4px 20px 28px;line-height:1.6;}
</style>
</head>
<body>
<header>
  <div class="bar">
    <div class="brand"><span class="glyph">あ</span> Japan Phrases</div>

</header>

// ---- Theme ----
const themeBtn = document.getElementById("theme");
function saved(k){ try{return localStorage.getItem(k);}catch(e){return null;} }
function store(k,v){ try{localStorage.setItem(k,v);}catch(e){} }
(function initTheme(){
  const s = saved("theme");
  const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
  const theme = s || (prefersDark ? "dark" : "light");
  document.documentElement.setAttribute("data-theme", theme);
})();
themeBtn.onclick = ()=>{
  const cur = document.documentElement.getAttribute("data-theme");
  const next = cur === "dark" ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", next);
  store("theme", next);
};

// ---- Speech ----
let voice = null;
function pickVoice(){
  const vs = speechSynthesis.getVoices();
  voice = vs.find(v=>v.lang==="ja-JP") || vs.find(v=>v.lang&&v.lang.startsWith("ja")) || null;
}
if("speechSynthesis" in window){
  pickVoice();
  speechSynthesis.onvoiceschanged = pickVoice;
}
let curBtn = null;
function speak(text, btn){
  if(!("speechSynthesis" in window)) return;
  speechSynthesis.cancel();
  if(curBtn){curBtn.classList.remove("playing");}
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "ja-JP";
  if(voice) u.voice = voice;
  u.rate = 0.85;
  btn.classList.add("playing"); curBtn = btn;
  u.onend = ()=>btn.classList.remove("playing");
  u.onerror = ()=>btn.classList.remove("playing");
  speechSynthesis.speak(u);
}

// ---- Render ----
const tabsEl = document.getElementById("tabs");
const mainEl = document.getElementById("main");
const searchEl = document.getElementById("search");
const clearEl = document.getElementById("clear");

const spkIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M19 5a9 9 0 0 1 0 14"/></svg>';

function renderTabs(){
  tabsEl.innerHTML = "";
  CATS.forEach(c=>{
    const b = document.createElement("button");
    b.className = "chip"+(c===activeCat?" active":"");
    b.textContent = c;
    b.onclick = ()=>{activeCat=c; query=""; searchEl.value=""; clearEl.classList.remove("show"); renderTabs(); render(); window.scrollTo(0,0);};
    tabsEl.appendChild(b);
  });
}

function norm(s){return s.toLowerCase();}
function match(p){
  if(!query) return activeCat==="All"||p.c===activeCat;
  const q = norm(query);
  const hit = norm(p.en).includes(q)||norm(p.r).includes(q)||norm(p.phon).includes(q)||p.j.includes(query)||norm(p.c).includes(q);
  return hit;
}

function card(p){
  const d = document.createElement("div");
  d.className = "card";
  d.innerHTML =
    '<div class="body">'+
      '<div class="en"></div>'+
      '<div class="phon"></div>'+
      '<div class="romaji"></div>'+
      '<div class="jp"></div>'+
    '</div>'+
    '<button class="speak" aria-label="Play pronunciation">'+spkIcon+'</button>';
  d.querySelector(".en").textContent = p.en;
  d.querySelector(".phon").textContent = p.phon;
  d.querySelector(".romaji").textContent = p.r;
  d.querySelector(".jp").textContent = p.j;
  d.querySelector(".speak").onclick = function(){ speak(p.j, this); };
  return d;
}

function render(){
  const list = PHRASES.filter(match);
  mainEl.innerHTML = "";
  if(list.length===0){
    mainEl.innerHTML = '<div class="empty">No phrases found.<br>Try another word.</div>';
    return;
  }
  if(query){
    list.forEach(p=>mainEl.appendChild(card(p)));
  } else {
    let last = null;
    list.forEach(p=>{
      if(p.c!==last){
        const h=document.createElement("div");
        h.className="cat-head"; h.textContent=p.c;
        mainEl.appendChild(h); last=p.c;
      }
      mainEl.appendChild(card(p));
    });
  }
  const c=document.createElement("div");
  c.className="count"; c.textContent=list.length+" phrase"+(list.length>1?"s":"");
  mainEl.appendChild(c);
}

searchEl.addEventListener("input",e=>{
  query = e.target.value.trim();
  clearEl.classList.toggle("show", query.length>0);
  render();
});
clearEl.onclick=()=>{query="";searchEl.value="";clearEl.classList.remove("show");render();searchEl.focus();};

renderTabs();
render();
</script>
</body>
</html>
